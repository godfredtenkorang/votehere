{% extends 'vote/base.html' %}
{% load static %}
{% block content %}
<style>
    /* General Reset */
.vote-body {

 
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'DM Sans', sans-serif;
  padding: 20px 20px;
}

.vote-body .container {
  width: 100%;
  max-width: 520px;
}

.vote-body .message-box {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 24px;
  padding: 30px 40px;
  text-align: center;
  position: relative;
  overflow: hidden;
}

.vote-body .message-box::before {
  content: '';
  position: absolute;
  width: 300px; height: 300px;
  background: rgba(245,166,35,0.05);
  border-radius: 50%;
  top: -120px; left: 50%;
  transform: translateX(-50%);
  pointer-events: none;
}

.ended-icon {
  width: 72px; height: 72px;
  background: rgba(245,166,35,0.1);
  border: 1px solid rgba(245,166,35,0.25);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 28px;
  font-size: 32px;
}

.vote-body .message-box h1 {
  font-family: 'Syne', sans-serif;
  font-size: clamp(26px, 5vw, 36px);
  font-weight: 800;
  color: #ffffff;
  margin: 0 0 16px;
  line-height: 1.2;
}

.vote-body .message-box h1 span { color: #f5a623; }

.vote-body .message-box p {
  font-size: 15px;
  color: rgba(255,255,255,0.5);
  line-height: 1.7;
  margin: 0 auto 36px;
  max-width: 340px;
}

.divider {
  width: 48px; height: 3px;
  background: linear-gradient(90deg, #f5a623, #e07b00);
  border-radius: 100px;
  margin: 0 auto 36px;
}





/* Message Box */
.message-box h1 {
  font-size: 2rem;
  color: #333333;
  margin-bottom: 10px;
}

.message-box p {
  font-size: 1rem;
  color: #666666;
}
</style>
<!-- banner -->
<div class="banners">
    <div class="banners-content">
        <div class="button">

            <a href="{% url 'index' %}">Return Home</a>

        </div>
    </div>
</div>
<br><br><br><br><br>
<div class="vote-body">
  <div class="container">
    <div class="message-box">
      <div class="ended-icon"><i class="fas fa-flag-checkered"></i></div>
      <h1>Voting Has <span>Ended</span></h1>
      <div class="divider"></div>
      <p>Thank you for your participation. The voting session is now closed.</p>
      <!-- <a class="results-btn" href="#">View Results →</a> -->
    </div>
  </div>
</div>

{% endblock content %}
