{% if messages %}
<section class="vote-succes-or-fail">

    <div class="success-card">

        <div class="success-icon fail-icon">
            <i class="fa-solid fa-ban"></i>
        </div>

        <h1>Vote Failed</h1>

        <p>
            {% for message in messages %}
                {{ message }}
            {% endfor %}
        </p>

        <a href="{% url 'index' %}" class="back-home-btn">
            Return Home
        </a>

    </div>

</section>
{% endif %}
